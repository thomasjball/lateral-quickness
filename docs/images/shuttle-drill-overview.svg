<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Lateral quickness drill overview</title>
  <desc id="desc">Runner moves back and forth between two anchor cones.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .lane { fill: #ffffff; stroke: #d9d1bf; stroke-width: 3; }
      .anchorA { fill: #1d4e89; }
      .anchorB { fill: #9a3412; }
      .runner { fill: #14532d; }
      .textDark { fill: #1f2937; font: 700 24px 'Avenir Next', 'Trebuchet MS', sans-serif; }
      .textMed { fill: #334155; font: 600 18px 'Avenir Next', 'Trebuchet MS', sans-serif; }
      .arrow { stroke: #0f766e; stroke-width: 8; fill: none; marker-end: url(#arrowHead); }
      .pulse0 { stroke: #1d4e89; stroke-width: 4; fill: none; opacity: 0.7; }
      .pulse1 { stroke: #9a3412; stroke-width: 4; fill: none; opacity: 0.7; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" rx="24" />
  <rect class="lane" x="90" y="120" width="1020" height="210" rx="20" />

  <g transform="translate(170,220)">
    <polygon class="anchorA" points="0,70 40,0 80,70" />
    <rect class="anchorA" x="20" y="72" width="40" height="26" rx="6" />
    <text class="textMed" x="-24" y="130">Anchor A</text>
    <text class="textMed" x="-4" y="154">Channel 0</text>
    <circle class="pulse0" cx="40" cy="30" r="55" />
    <circle class="pulse0" cx="40" cy="30" r="80" />
  </g>

  <g transform="translate(950,220)">
    <polygon class="anchorB" points="0,70 40,0 80,70" />
    <rect class="anchorB" x="20" y="72" width="40" height="26" rx="6" />
    <text class="textMed" x="-22" y="130">Anchor B</text>
    <text class="textMed" x="-2" y="154">Channel 1</text>
    <circle class="pulse1" cx="40" cy="30" r="55" />
    <circle class="pulse1" cx="40" cy="30" r="80" />
  </g>

  <g transform="translate(560,210)">
    <circle class="runner" cx="40" cy="30" r="20" />
    <rect class="runner" x="22" y="50" width="36" height="58" rx="14" />
    <text class="textMed" x="-16" y="145">Runner micro:bit</text>
  </g>

  <path class="arrow" d="M 300 180 C 470 120, 730 120, 900 180" />
  <path class="arrow" d="M 900 255 C 730 315, 470 315, 300 255" />

  <text class="textDark" x="80" y="70">Runner shuttles between anchors and alternates channels</text>
  <text class="textMed" x="82" y="96">Detect Anchor A (ch 0) → switch to ch 1 → run to Anchor B → switch back to ch 0</text>
</svg>
