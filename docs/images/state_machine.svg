<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .state-box { fill: #e8f4f8; stroke: #2c3e50; stroke-width: 2; }
      .state-runner-idle { fill: #d4edda; stroke: #28a745; stroke-width: 2; }
      .state-runner-active { fill: #fff3cd; stroke: #ffc107; stroke-width: 2; }
      .state-anchor { fill: #f8d7da; stroke: #dc3545; stroke-width: 2; }
      .state-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .transition-label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; text-anchor: middle; }
      .transition-arrow { fill: none; stroke: #2c3e50; stroke-width: 2; marker-end: url(#arrowhead); }
      .transition-line { fill: none; stroke: #2c3e50; stroke-width: 2; marker-end: url(#arrowhead); }
      .legend-text { font-family: Arial, sans-serif; font-size: 12px; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="30" class="title" text-anchor="middle">Lateral Quickness State Machine</text>
  <text x="700" y="50" class="legend-text" text-anchor="middle" font-size="11">(anchor, running, radio_channel)</text>

  <!-- Runner Idle States (left column) -->
  <rect x="50" y="100" width="220" height="90" rx="5" class="state-runner-idle"/>
  <text x="160" y="135" class="state-text">Runner Idle</text>
  <text x="160" y="155" class="state-text" font-size="12">(0, 0, 0)</text>
  <text x="160" y="175" class="state-text" font-size="11" font-weight="normal">Channel 0</text>

  <rect x="50" y="270" width="220" height="90" rx="5" class="state-runner-idle"/>
  <text x="160" y="305" class="state-text">Runner Idle</text>
  <text x="160" y="325" class="state-text" font-size="12">(0, 0, 1)</text>
  <text x="160" y="345" class="state-text" font-size="11" font-weight="normal">Channel 1</text>

  <!-- Runner Active States (middle column) -->
  <rect x="400" y="100" width="220" height="90" rx="5" class="state-runner-active"/>
  <text x="510" y="135" class="state-text">Runner Active</text>
  <text x="510" y="155" class="state-text" font-size="12">(0, 1, 0)</text>
  <text x="510" y="175" class="state-text" font-size="11" font-weight="normal">Channel 0</text>

  <rect x="400" y="270" width="220" height="90" rx="5" class="state-runner-active"/>
  <text x="510" y="305" class="state-text">Runner Active</text>
  <text x="510" y="325" class="state-text" font-size="12">(0, 1, 1)</text>
  <text x="510" y="345" class="state-text" font-size="11" font-weight="normal">Channel 1</text>

  <!-- Anchor States (right column) -->
  <rect x="770" y="100" width="220" height="90" rx="5" class="state-anchor"/>
  <text x="880" y="135" class="state-text">Anchor Mode</text>
  <text x="880" y="155" class="state-text" font-size="12">(1, 0, 0)</text>
  <text x="880" y="175" class="state-text" font-size="11" font-weight="normal">Channel 0</text>

  <rect x="770" y="270" width="220" height="90" rx="5" class="state-anchor"/>
  <text x="880" y="305" class="state-text">Anchor Mode</text>
  <text x="880" y="325" class="state-text" font-size="12">(1, 0, 1)</text>
  <text x="880" y="345" class="state-text" font-size="11" font-weight="normal">Channel 1</text>

  <!-- Transitions: Runner Idle (0,0,0) to Runner Active (0,1,0) -->
  <path d="M 270 145 L 400 145" class="transition-line"/>
  <text x="335" y="135" class="transition-label">Logo Touch</text>

  <!-- Transitions: Runner Idle (0,0,1) to Runner Active (0,1,1) -->
  <path d="M 270 315 L 400 315" class="transition-line"/>
  <text x="335" y="305" class="transition-label">Logo Touch</text>

  <!-- Transitions: Runner Active (0,1,0) to Runner Idle (0,0,0) - 30s timeout -->
  <path d="M 380 180 Q 300 220 270 180" class="transition-line"/>
  <text x="310" y="220" class="transition-label">30s Timeout</text>

  <!-- Transitions: Runner Active (0,1,1) to Runner Idle (0,0,1) - 30s timeout -->
  <path d="M 380 350 Q 300 390 270 350" class="transition-line"/>
  <text x="310" y="390" class="transition-label">30s Timeout</text>

  <!-- Transitions: Signal detection toggles channel in runner active mode -->
  <path d="M 510 190 L 510 270" class="transition-line"/>
  <text x="580" y="230" class="transition-label">Anchor Pulse</text>
  <text x="580" y="245" class="transition-label">Signal ≥ -40dBm</text>

  <path d="M 510 270 L 510 190" class="transition-line"/>
  <text x="380" y="230" class="transition-label">Anchor Pulse</text>
  <text x="380" y="245" class="transition-label">Signal ≥ -40dBm</text>

  <!-- Transitions: Button A - Runner Idle (0,0,0) to Anchor (1,0,0) -->
  <path d="M 270 145 Q 520 100 770 145" class="transition-line" stroke-dasharray="5,5"/>
  <text x="520" y="95" class="transition-label">Button A</text>

  <!-- Transitions: Button A - Runner Idle (0,0,1) to Anchor (1,0,1) -->
  <path d="M 270 315 Q 520 360 770 315" class="transition-line" stroke-dasharray="5,5"/>
  <text x="520" y="370" class="transition-label">Button A</text>

  <!-- Transitions: Button AB - Anchor (1,0,0) to Anchor (1,0,1) -->
  <path d="M 880 190 L 880 270" class="transition-line"/>
  <text x="950" y="230" class="transition-label">Button AB</text>

  <!-- Loop: Anchor maintains state when Button AB pressed in Ch1 -->
  <path d="M 990 315 Q 1060 345 990 285" class="transition-line" stroke-dasharray="5,5"/>
  <text x="1080" y="315" class="transition-label">Button AB</text>
  <text x="1080" y="330" class="transition-label">(stays Ch 1)</text>

  <!-- Legend -->
  <rect x="50" y="550" width="1300" height="300" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="5,5"/>
  
  <text x="60" y="575" class="title" font-size="14">Legend ands State Information</text>

  <text x="60" y="610" class="legend-text" font-weight="bold">State Variables:</text>
  <text x="80" y="630" class="legend-text">• anchor: 0=Runner Mode, 1=Anchor Mode</text>
  <text x="80" y="650" class="legend-text">• running: 0=Idle, 1=Active Run (30s max)</text>
  <text x="80" y="670" class="legend-text">• radio_channel: 0 or 1 (toggles on signal detection)</text>

  <text x="60" y="710" class="legend-text" font-weight="bold">Actions per State:</text>
  <text x="80" y="730" class="legend-text">Runner Idle: Show icon, wait for input</text>
  <text x="80" y="750" class="legend-text">Runner Active: Show signal count (bar graph), count signals ≥-40dBm, toggle channel on each</text>
  <text x="80" y="770" class="legend-text">Anchor Mode: Broadcast radio pulse 10x/sec, show current channel number</text>

  <text x="800" y="610" class="legend-text" font-weight="bold">Button Actions:</text>
  <text x="820" y="630" class="legend-text">• Button A: Enter Anchor Mode (only when idle)</text>
  <text x="820" y="650" class="legend-text">• Button AB: Force Channel 1 (only when anchor)</text>
  <text x="820" y="670" class="legend-text">• Button B: Display current signal count</text>
  <text x="820" y="690" class="legend-text">• Logo Touch: Start 30s runner timed run</text>
  <text x="820" y="710" class="legend-text">           (only when runner is idle)</text>

  <text x="800" y="750" class="legend-text" font-weight="bold">Signal Detection:</text>
  <text x="820" y="770" class="legend-text">• Increments count, toggles channel, plays tone</text>
  <text x="820" y="790" class="legend-text">• Only during Runner Active mode</text>

  <!-- Color legend -->
  <rect x="60" y="830" width="15" height="15" rx="2" class="state-runner-idle"/>
  <text x="85" y="842" class="legend-text">Runner Idle</text>

  <rect x="250" y="830" width="15" height="15" rx="2" class="state-runner-active"/>
  <text x="275" y="842" class="legend-text">Runner Active</text>

  <rect x="450" y="830" width="15" height="15" rx="2" class="state-anchor"/>
  <text x="475" y="842" class="legend-text">Anchor Mode</text>
</svg>